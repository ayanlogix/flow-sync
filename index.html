<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow-Sync | Visual Automation Orchestrator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230f172a%22/><circle cx=%2230%22 cy=%2250%22 r=%2210%22 fill=%22%238b5cf6%22/><circle cx=%2270%22 cy=%2250%22 r=%2210%22 fill=%22%238b5cf6%22/><path d=%22M30 50Q50 30 70 50%22 stroke=%22%238b5cf6%22 stroke-width=%224%22 fill=%22none%22/></svg>">
</head>
<body>
    <div class="studio-container">
        <!-- Top Navigation -->
        <header class="studio-header">
            <div class="brand">
                <div class="logo-box">
                    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <h1>Flow-Sync</h1>
            </div>
            <div class="header-actions">
                <div class="sync-status">
                    <span class="dot pulse"></span>
                    ACTIVE_SYHCHRONIZER
                </div>
                <button class="deploy-btn">Deploy Automation</button>
            </div>
        </header>

        <main class="workspace">
            <!-- Sidebar: Connectors Library -->
            <aside class="connector-panel">
                <div class="panel-header">APP_CONNECTORS</div>
                <div class="connector-list">
                    <div class="connector-item" draggable="true" data-node-type="stripe">
                        <div class="icon stripe">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.911 8.067c0-1.23-.801-1.902-1.933-1.902-1.462 0-2.352.661-2.352 1.942 0 1.25.922 1.782 2.112 2.202 1.352.481 2.803.961 2.803 2.843 0 1.831-1.392 2.923-3.233 2.923-1.632 0-2.823-.741-2.823-2.122h1.652c0 .88.58 1.261 1.251 1.261.941 0 1.482-.541 1.482-1.311 0-1.182-.871-1.632-1.992-2.032-1.21-.441-2.903-.981-2.903-2.933 0-1.792 1.302-2.843 3.033-2.843 1.452 0 2.502.66 2.502 1.902h-1.602z"/></svg>
                        </div>
                        <span>Stripe Trigger</span>
                    </div>
                    <div class="connector-item" draggable="true" data-node-type="shopify">
                        <div class="icon shopify">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.17 6.46l-2.04-4.52s-.08-.13-.13-.19c-.06-.06-.11-.12-.18-.16-.06-.04-.14-.07-.21-.08l-.13-.01H8.72l-.13.01c-.08.01-.15.04-.21.08-.06.04-.12.1-.18.16-.05.06-.09.12-.13.19l-2.04 4.52-3.1 1.54c-.11.05-.2.13-.27.23-.07.11-.11.23-.11.35v12.28c0 .24.1.48.27.65.17.17.41.27.65.27h14.94c.24 0 .48-.1.65-.27.17-.17.27-.41.27-.65V8.58c0-.12-.04-.24-.11-.35-.07-.1-.16-.18-.27-.23l-3.1-1.54zm-6.17-2.96l1.35 3.03h-2.7l1.35-3.03z"/></svg>
                        </div>
                        <span>Shopify Order</span>
                    </div>
                    <div class="connector-item" draggable="true" data-node-type="discord">
                        <div class="icon discord">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.947 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.946 2.419-2.157 2.419z"/></svg>
                        </div>
                        <span>Discord Notify</span>
                    </div>
                    <div class="connector-item" draggable="true" data-node-type="gmail">
                        <div class="icon gmail">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        </div>
                        <span>Gmail Send</span>
                    </div>
                    <div class="connector-item" draggable="true" data-node-type="slack">
                        <div class="icon slack">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.527 2.527 0 0 1 2.521 2.52v6.313A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.522v-6.313zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.527 2.527 0 0 1 2.521 2.522v2.52H8.834zM8.834 6.313a2.527 2.527 0 0 1 2.521 2.521 2.527 2.527 0 0 1-2.521 2.521H2.522A2.528 2.528 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.958 8.834a2.528 2.528 0 0 1 2.522-2.521A2.528 2.528 0 0 1 24 8.834a2.527 2.527 0 0 1-2.52 2.521h-2.522V8.834zM17.687 8.834a2.527 2.527 0 0 1-2.521 2.521 2.527 2.527 0 0 1-2.521-2.521V2.522A2.528 2.528 0 0 1 15.166 0a2.528 2.528 0 0 1 2.521 2.522v6.312zM15.166 18.958a2.528 2.528 0 0 1 2.521 2.522A2.528 2.528 0 0 1 15.166 24a2.527 2.527 0 0 1-2.521-2.522v-2.52h2.521zM15.166 17.687a2.527 2.527 0 0 1-2.521-2.521 2.527 2.527 0 0 1 2.521-2.521h6.312A2.528 2.528 0 0 1 24 15.166a2.528 2.528 0 0 1-2.522 2.521h-6.312z"/></svg>
                        </div>
                        <span>Slack Message</span>
                    </div>
                </div>
                <div class="guide-text">Drag connectors onto the canvas to build a workflow.</div>
            </aside>

            <!-- Center: Node Workspace -->
            <section class="canvas-stage">
                <div class="stage-overlay">
                    <div class="coord-info">X: 124.0 / Y: 562.8</div>
                    <div class="zoom-controls">
                        <button>+</button>
                        <span>100%</span>
                        <button>-</button>
                    </div>
                </div>
                <div id="nodeCanvasWrapper" class="canvas-wrapper">
                    <canvas id="linkCanvas"></canvas>
                    <div id="nodesContainer" class="nodes-container">
                        <!-- Dynamic Nodes -->
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Activity Log -->
        <footer class="activity-bar">
            <div class="log-label">EXECUTION_SEQUENCE</div>
            <div id="executionLog" class="log-entries">
                <div class="log-item system">Orchestrator online. Awaiting trigger event.</div>
            </div>
        </footer>
    </div>

    <script src="script.js?v=2.0"></script>
</body>
</html>
